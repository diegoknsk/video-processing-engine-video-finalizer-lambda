name: Deploy Lambda Finalizer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'video-processing-engine-dev-video-finalizer' }}
  # Handler deve ser igual ao "function-handler" em aws-lambda-tools-defaults.json do projeto Lambda
  LAMBDA_HANDLER: VideoProcessing.Finalizer.Lambda::VideoProcessing.Finalizer.Lambda.Function::FunctionHandler
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  LAMBDA_RUNTIME: dotnet10

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Install Amazon.Lambda.Tools
        run: |
          dotnet tool install -g Amazon.Lambda.Tools
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - name: Create Lambda deployment package
        run: |
          dotnet lambda package \
            --project-location src/InterfacesExternas/VideoProcessing.Finalizer.Lambda \
            --configuration Release \
            --output-package deployment-package.zip

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deployment-package.zip

      - name: Wait for Lambda update
        if: github.event_name == 'push'
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Update Lambda configuration (handler + runtime)
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --handler "${{ env.LAMBDA_HANDLER }}" \
            --runtime ${{ env.LAMBDA_RUNTIME }}

      - name: Wait for Lambda configuration update
        if: github.event_name == 'push'
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Verify deployment
        if: github.event_name == 'push'
        run: |
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.{Name:FunctionName,Handler:Handler,LastModified:LastModified,Runtime:Runtime,State:State}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package.zip
